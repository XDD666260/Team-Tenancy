<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房源地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #container { width: 100%; height: 100%; }
        #infoBox {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.95); padding: 20px 28px; border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000;
            font-size: 14px; color: #333; text-align: center;
        }
        #infoBox .spinner {
            display: inline-block; width: 22px; height: 22px;
            border: 3px solid #e0e0e0; border-top-color: #2196F3;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-right: 10px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls {
            position: absolute; top: 16px; right: 16px; z-index: 999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .controls button {
            width: 40px; height: 40px; border: none; border-radius: 8px;
            background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            cursor: pointer; font-size: 18px; line-height: 40px; text-align: center;
            transition: background 0.2s; color: #555;
        }
        .controls button:active { transform: scale(0.95); }
        .controls button.active { background: #2196F3; color: #fff; }
        #countBadge {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); color: #fff; padding: 6px 16px;
            border-radius: 20px; font-size: 13px; z-index: 999; display: none;
            white-space: nowrap; pointer-events: none;
        }
        #legend {
            position: absolute; bottom: 70px; left: 16px; z-index: 999;
            background: rgba(255,255,255,0.93); padding: 10px 14px; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12); font-size: 11px; color: #666;
            display: none; line-height: 1.8;
        }
        #legend .bar { display: flex; gap: 0; margin-top: 4px; border-radius: 4px; overflow: hidden; }
        #legend .bar span { width: 32px; height: 8px; }
    </style>
</head>
<body>

    <div id="container"></div>
    <div id="debugInfo" style="position:absolute;top:60px;left:8px;z-index:2000;background:rgba(0,0,0,0.85);color:#0f0;font-size:11px;font-family:monospace;padding:8px 12px;border-radius:6px;max-height:300px;overflow-y:auto;max-width:280px;display:none;line-height:1.6;pointer-events:none;"></div>

    <div id="infoBox">
        <span class="spinner"></span> 加载地图中...
    </div>

<!--    <div class="controls">-->
<!--        <button id="btnHeatmap" class="active" onclick="toggleHeatmap()" title="热力图">🔥</button>-->
<!--        <button id="btnMarker" class="active" onclick="toggleMarker()" title="标注">📍</button>-->
<!--    </div>-->

    <div id="legend">
        低 <div class="bar">
            <span style="background:#2196F3;"></span>
            <span style="background:#4CAF50;"></span>
            <span style="background:#FFEB3B;"></span>
            <span style="background:#FF9800;"></span>
            <span style="background:#F44336;"></span>
        </div> 高
    </div>



<script>
    // ======== 全局错误捕获 ========
    window.onerror = function(msg, url, line, col, err) {
        var el = document.getElementById("debugInfo");
        if (el) el.innerHTML += '<div style="color:#f44;">错误: ' + msg + ' (行' + line + ')</div>';
        console.error("[Map][FATAL]", msg, url, line, col, err);
    };

    // ======== 工具函数 ========
    function log(msg) { console.log('[Map] ' + msg); }

    function b64decode(b64) {
        try {
            var decoded = decodeURIComponent(Array.prototype.map.call(
                atob(b64), function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }
            ).join(''));
            return decoded;
        } catch (e) {
            log('b64decode fallback: ' + e.message);
            try { return decodeURIComponent(escape(atob(b64))); } catch (e2) { log('b64decode failed: ' + e2.message); return ''; }
        }
    }

    // ======== 异步加载 AMap SDK ========
    function loadAMapSDK() {
        var s = document.createElement('script');
        s.src = 'https://webapi.amap.com/maps?v=2.0&key=88060df7838717adca9ea8bb6a9f39f2&plugin=AMap.MarkerClusterer,AMap.HeatmapLayer';
        s.onload = function() {
            var box = document.getElementById('infoBox');
            if (box) box.innerHTML = '地图初始化中...';
            log('SDK OK, init map...');
            initMap();
        };
        s.onerror = function() {
            log('ERROR: AMap SDK load failed - check network');
            var box = document.getElementById('infoBox');
            if (box) box.innerHTML = '地图加载失败 - 请检查网络连接';
        };
        document.head.appendChild(s);
    }

    // ======== SDK 超时检测 (10秒) ========
    setTimeout(function() {
        var box = document.getElementById('infoBox');
        if (box && typeof AMap === 'undefined') {
            box.innerHTML = '地图加载失败 - 网络超时，请检查网络连接';
        }
    }, 10000);

    // ======== infoBox点击切换调试面板 ========
    document.addEventListener("DOMContentLoaded", function() {
        var box = document.getElementById("infoBox");
        if (box) {
            box.addEventListener("click", function() {
                var dbg = document.getElementById("debugInfo");
                if (dbg) dbg.style.display = dbg.style.display === "none" ? "block" : "none";
            });
        }
        loadAMapSDK();
    });

    // ======== 地图初始化 (SDK加载后调用) ========
    var map;
    var allData = [];
    var markersVisible = true;
    var _mapMarkers = [];
    var _currentDistrict = '';

    function initMap() {
        map = new AMap.Map('container', {
            zoom: 12,
            center: [106.5516, 29.5630],
            mapStyle: 'amap://styles/light',
            resizeEnable: true
        });

        map.on('complete', function() {
            if (allData.length > 0) {
                renderMarkers();
            }
            window._mapReady = true;
            setTimeout(function() {
                var box = document.getElementById('infoBox');
                if (box) box.style.display = 'none';
            }, 1500);
        });
    }

    function loadPointsB64(b64) {
        try {
            var json = b64decode(b64);
            allData = JSON.parse(json);
            if (!Array.isArray(allData)) allData = [];
        } catch(e) {
            allData = [];
        }
        if (typeof AMap !== 'undefined' && map && window._mapReady) {
            renderMarkers();
        }
    }

    function loadDistrictsB64(b64) {
        // 区县列表由 Android 端 Chip 处理，此处仅作存储备用
        try {
            var districts = JSON.parse(b64decode(b64));
            if (!Array.isArray(districts)) districts = [];
        } catch(e) {
            log('DISTRICT ERR: ' + e);
        }
    }

    function filterByDistrict(district) {
        _currentDistrict = district || '';
        if (typeof AMap !== 'undefined' && map && window._mapReady) {
            renderMarkers();
        }
    }

    function getCurrentFiltered() {
        if (_currentDistrict) {
            return allData.filter(function(p) { return p.district === _currentDistrict; });
        }
        return allData;
    }

    function getPriceColor(price) {
        if (!price || price <= 0) return '#999';
        if (price < 10000) return '#4CAF50';
        if (price < 20000) return '#8BC34A';
        if (price < 30000) return '#FFEB3B';
        if (price < 50000) return '#FF9800';
        return '#F44336';
    }

    function renderMarkers() {
        if (_mapMarkers.length > 0) {
            map.remove(_mapMarkers);
            _mapMarkers = [];
        }
        var filtered = getCurrentFiltered();
        if (!markersVisible || filtered.length === 0) {
            document.getElementById('countBadge').style.display = 'none';
            return;
        }

        var startTime = Date.now();
        _mapMarkers = filtered.map(function(p, idx) {
            var color = getPriceColor(p.unit_price);
            var marker = new AMap.Marker({
                position: [p.lng, p.lat],
                offset: new AMap.Pixel(-7, -7),
                content: '<div style="width:14px;height:14px;border-radius:50%;background:' + color +
                         ';border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>',
                zIndex: 50,
                extData: p
            });
            marker.on('click', function(e) {
                var d = e.target.getExtData();
                if (!d) return;
                var ps = d.unit_price ? (d.unit_price >= 10000 ? (d.unit_price/10000).toFixed(1)+'万' : d.unit_price+'元') : '--';
                var tp = d.total_price ? (d.total_price >= 10000 ? (d.total_price/10000).toFixed(1)+'万' : d.total_price+'万') : '--';
                var info = new AMap.InfoWindow({
                    content: '<div style="padding:8px 14px;font-size:13px;line-height:1.7;min-width:140px;">' +
                             '<b style="font-size:14px;">' + (d.community || d.title || '--') + '</b><br/>' +
                             '<span style="color:#999;">总价:</span>' + tp +
                             ' <span style="color:#999;">单价:</span>' + ps + '<br/>' +
                             '<span style="color:#999;">面积:</span>' + (d.area ? d.area+'m²' : '--') +
                             ' <span style="color:#999;">户型:</span>' + (d.layout || '--') +
                             '</div>',
                    offset: new AMap.Pixel(0, -18)
                });
                info.open(map, [d.lng, d.lat]);
            });
            return marker;
        });
        map.add(_mapMarkers);
        var elapsed = Date.now() - startTime;
        document.getElementById('countBadge').textContent = filtered.length + ' 个房源';
        document.getElementById('countBadge').style.display = 'block';
    }

    function toggleMarker() {
        markersVisible = !markersVisible;
        document.getElementById('btnMarker').classList.toggle('active', markersVisible);
        if (markersVisible) {
            renderMarkers();
        } else {
            if (_mapMarkers.length > 0) { map.remove(_mapMarkers); _mapMarkers = []; }
            document.getElementById('countBadge').style.display = 'none';
        }
    }

    function toggleHeatmap() {
        // heatmap disabled - not compatible with AMap v2.0
    }
</script>

</body>
</html>
